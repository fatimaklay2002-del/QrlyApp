name: qrly_app
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.12.1


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  persistent_bottom_nav_bar: ^6.2.1
  flutter_svg: ^2.3.0
  qr_flutter: ^4.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.3
  flutter_bloc: ^9.1.1
  mobile_scanner: ^7.2.0
  gal: ^2.3.2
  share_plus: ^13.2.0
  path_provider: ^2.1.6
  hive_test: ^1.0.1
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_native_splash: ^2.4.8

  flutter_lints: ^6.0.0


flutter:

  uses-material-design: true

  assets:
    - assets/images/




  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_Regular.ttf
      
flutter_native_splash:
  color: "#F9F9FD"
  image: assets/images/splash.png
  android_12:
    image: assets/images/splash.png
    color: "#F9F9FD"